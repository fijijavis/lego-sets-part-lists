<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --border: #252c3a;
    --accent: #4ab4e8;
    --accent-dim: rgba(74,180,232,0.15);
    --accent-glow: rgba(74,180,232,0.4);
    --text: #c8d8e8;
    --text-dim: #5a7090;
    --done-bg: rgba(74,180,232,0.08);
    --done-border: #4ab4e8;
    --partial-border: #e8b44a;
    --partial-bg: rgba(232,180,74,0.07);
    --card-w: 160px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; }

  /* ─── HEADER ─── */
  header { padding: 28px 24px 0; max-width: 1400px; margin: 0 auto; }
  .set-label { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .set-name  { font-family: 'Orbitron', sans-serif; font-size: clamp(18px, 3vw, 28px); font-weight: 900; color: #e8f4ff; letter-spacing: 0.05em; line-height: 1.1; }
  .set-name span { color: var(--accent); }

  .stats-bar { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  .stat { font-size: 12px; color: var(--text-dim); }
  .stat strong { font-family: 'Orbitron', sans-serif; font-size: 15px; color: var(--text); }

  .progress-wrap { margin-top: 12px; background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-bar  { height: 100%; background: linear-gradient(90deg, var(--accent), #7adcff); border-radius: 4px; transition: width 0.4s ease; width: 0%; }

  /* ─── CONTROLS ─── */
  .controls { padding: 18px 24px; max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); }
  .filter-group { display: flex; gap: 6px; }
  .btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; white-space: nowrap;
  }
  .btn:hover  { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .btn-action { border-color: #2a3a50; color: #4a7090; }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-reset { border-color: #3a1a1a; color: #704040; }
  .btn-reset:hover { border-color: #e84a4a; color: #e84a4a; }

  .color-pill {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface); cursor: pointer;
    font-size: 10px; color: var(--text-dim); transition: all 0.2s; white-space: nowrap;
  }
  .color-pill:hover { border-color: #4a6080; color: var(--text); }
  .color-pill.active { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
  .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .controls-sep { width: 1px; height: 24px; background: var(--border); }
  .spacer { flex: 1; }

  /* ─── GRID ─── */
  main { padding: 20px 24px 60px; max-width: 1400px; margin: 0 auto; }
  .parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
    gap: 10px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; cursor: pointer; transition: border-color 0.2s, opacity 0.2s, background 0.2s;
    position: relative; user-select: none; display: flex; flex-direction: column; gap: 6px;
  }
  .card:hover { border-color: #3a5070; }
  .card.partial { border-color: var(--partial-border); background: var(--partial-bg); }
  .card.done    { border-color: var(--done-border); background: var(--done-bg); opacity: 0.65; }
  .card.hidden  { display: none; }

  .card-img-wrap { position: relative; aspect-ratio: 1; background: #0d1018; border-radius: 5px; overflow: hidden; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .card-img-wrap .done-overlay {
    position: absolute; inset: 0; background: rgba(10,20,35,0.7); display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s; font-size: 28px;
  }
  .card.done .done-overlay { opacity: 1; }

  .color-badge {
    position: absolute; top: 5px; right: 5px; width: 9px; height: 9px;
    border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15);
  }

  .card-partno { font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; letter-spacing: 0.08em; }
  .card-name   { font-size: 10px; color: var(--text); line-height: 1.3; flex: 1; }

  /* counter */
  .card-counter { display: flex; align-items: center; gap: 4px; }
  .cnt-btn { background: #1a2230; border: 1px solid #252c3a; color: var(--text-dim); width: 20px; height: 20px; border-radius: 3px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s; flex-shrink: 0; }
  .cnt-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cnt-input {
    font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
    background: transparent; border: none; color: var(--accent);
    width: 28px; text-align: center; outline: none;
  }
  .cnt-input::-webkit-inner-spin-button { display: none; }
  .cnt-total { font-size: 10px; color: var(--text-dim); }

  /* ─── BANNER ─── */
  #banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(135deg, #0d1f35, #0a2040);
    border-bottom: 2px solid var(--accent); padding: 16px 24px;
    text-align: center; font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px,2vw,20px); font-weight: 700; color: var(--accent);
    letter-spacing: 0.15em; transform: translateY(-110%); transition: transform 0.5s ease;
    box-shadow: 0 4px 30px rgba(74,180,232,0.3);
  }
  #banner.show { transform: translateY(0); }

  /* ─── NO RESULTS ─── */
  #no-results { display: none; text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
</style>
</head>

  <input type="file" id="import-file" accept=".json" style="display:none">

</div>

<main>

// ── Unique key per part+color combination
function partKey(p) { return `${p.id}_${p.colorId}`; }

// ── State
const counts = {};
PARTS.forEach(p => { counts[partKey(p)] = 0; });

const STORAGE_KEY = 'lego10227_counts';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.keys(d).forEach(k => { if (k in counts) counts[k] = Math.max(0, +d[k] || 0); });
  } catch(e) {}
}

// ── Filters
let statusFilter = 'all';
let colorFilter  = null;

// ── Colours index
const colorsMap = {};
PARTS.forEach(p => { if(!colorsMap[p.color]) colorsMap[p.color] = p.colorHex; });

// ── Build colour pills
function buildColorPills() {
  const wrap = document.getElementById('color-filter');
  // All pill
  const allPill = document.createElement('button');
  allPill.className = 'color-pill active';
  allPill.dataset.color = '__all__';
  allPill.innerHTML = `<span class="color-dot" style="background:#4ab4e8"></span>All`;
  wrap.appendChild(allPill);

  Object.entries(colorsMap).forEach(([name, hex]) => {
    const pill = document.createElement('button');
    pill.className = 'color-pill';
    pill.dataset.color = name;
    pill.innerHTML = `<span class="color-dot" style="background:${hex};border:1px solid rgba(255,255,255,0.2)"></span>${name}`;
    wrap.appendChild(pill);
  });

  wrap.addEventListener('click', e => {
    const pill = e.target.closest('.color-pill'); if(!pill) return;
    wrap.querySelectorAll('.color-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    colorFilter = pill.dataset.color === '__all__' ? null : pill.dataset.color;
    applyFilters();
  });
}

// ── Build cards
function buildGrid() {
  const grid = document.getElementById('grid');
  PARTS.forEach((p, i) => {
    const key = partKey(p);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = key;
    card.dataset.color = p.color;

    const imgSrc = `https://img.bricklink.com/ItemImage/PN/${p.colorId}/${p.id}.png`;
    const imgFallback = `https://img.bricklink.com/ItemImage/PN/0/${p.id}.png`;

    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${imgSrc}" alt="${p.name}" loading="lazy" onerror="this.src='${imgFallback}'">
        <div class="done-overlay">✓</div>
        <div class="color-badge" style="background:${p.colorHex};border:1.5px solid rgba(255,255,255,0.2)"></div>
      </div>
      <div class="card-partno">${p.id} · ${p.color}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-counter">
        <button class="cnt-btn dec">−</button>
        <input class="cnt-input" type="number" min="0" max="${p.qty}" value="0">
        <span class="cnt-total">/${p.qty}</span>
        <button class="cnt-btn inc" style="margin-left:auto">+</button>
      </div>
    `;

    // Click card body (not counter) = increment
    card.addEventListener('click', e => {
      if(e.target.closest('.card-counter')) return;
      setCount(key, Math.min(p.qty, counts[key] + 1));
    });

    card.querySelector('.inc').addEventListener('click', e => {
      e.stopPropagation();
      setCount(key, Math.min(p.qty, counts[key] + 1));
    });
    card.querySelector('.dec').addEventListener('click', e => {
      e.stopPropagation();
      setCount(key, Math.max(0, counts[key] - 1));
    });
    card.querySelector('.cnt-input').addEventListener('change', e => {
      e.stopPropagation();
      setCount(key, Math.min(p.qty, Math.max(0, parseInt(e.target.value)||0)));
    });
    card.querySelector('.cnt-input').addEventListener('click', e => e.stopPropagation());

    grid.appendChild(card);
  });
}

function setCount(key, val) {
  counts[key] = val;
  updateCard(key);
  updateStats();
  save();
}

function updateCard(key) {
  const part = PARTS.find(p => partKey(p) === key);
  if(!part) return;
  const card = document.querySelector(`.card[data-key="${key}"]`);
  if(!card) return;
  const v = counts[key];
  card.querySelector('.cnt-input').value = v;
  card.classList.toggle('done', v >= part.qty);
  card.classList.toggle('partial', v > 0 && v < part.qty);
}

function updateAllCards() {
  PARTS.forEach(p => updateCard(partKey(p)));
}

function updateStats() {
  const totalTypes = PARTS.length;
  const totalPcs   = PARTS.reduce((s,p) => s + p.qty, 0);
  const foundTypes = PARTS.filter(p => counts[partKey(p)] >= p.qty).length;
  const foundPcs   = PARTS.reduce((s,p) => s + Math.min(counts[partKey(p)], p.qty), 0);

  document.getElementById('types-found').textContent = foundTypes;
  document.getElementById('types-total').textContent = totalTypes;
  document.getElementById('pcs-found').textContent   = foundPcs;
  document.getElementById('pcs-total').textContent   = totalPcs;

  const pct = totalPcs ? (foundPcs / totalPcs * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';

  if(foundPcs === totalPcs && totalPcs > 0) showBanner();
}

let bannerTimer;
function showBanner() {
  const b = document.getElementById('banner');
  b.classList.add('show');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => b.classList.remove('show'), 5000);
}

function applyFilters() {
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const key   = card.dataset.key;
    const part  = PARTS.find(p => partKey(p) === key);
    const cnt   = counts[key];
    const done  = cnt >= part.qty;

    let show = true;
    if(statusFilter === 'remaining' && done)   show = false;
    if(statusFilter === 'found'    && !done)   show = false;
    if(colorFilter && card.dataset.color !== colorFilter) show = false;

    card.classList.toggle('hidden', !show);
    if(show) visible++;
  });
  document.getElementById('no-results').style.display = visible ? 'none' : 'block';
}

// ── Status filter
document.getElementById('status-filter').addEventListener('click', e => {
  const btn = e.target.closest('[data-status]'); if(!btn) return;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  statusFilter = btn.dataset.status;
  applyFilters();
});

// ── Export
document.getElementById('export-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(counts, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bwing_10227_progress.json';
  a.click();
});

// ── Import
document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      Object.keys(d).forEach(k => { if(k in counts) counts[k] = Math.max(0, +d[k]||0); });
      updateAllCards();
      updateStats();
      save();
    } catch(err) { alert('Invalid JSON file.'); }
  };
  r.readAsText(file);
  e.target.value = '';
});

// ── Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if(!confirm('Reset all counts to zero?')) return;
  PARTS.forEach(p => { counts[partKey(p)] = 0; });
  updateAllCards();
  updateStats();
  save();
});

// ── Init
load();
buildColorPills();
buildGrid();
updateAllCards();
updateStats();
applyFilters();
</script>
</body>
</html>
