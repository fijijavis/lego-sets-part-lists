<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2b;
    --border: #252c3a;
    --accent: #4ab4e8;
    --accent-dim: rgba(74,180,232,0.15);
    --accent-glow: rgba(74,180,232,0.4);
    --text: #c8d4e0;
    --text-dim: #6a7a8a;
    --green: #4ae89a;
    --amber: #e8b44a;
    --red: #e85a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #0d1118 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .set-title {
    font-family: 'Orbitron', sans-serif;
  }
  .set-number {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .set-name {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 0 20px var(--accent-glow);
  }
  .progress-stats {
    text-align: right;
    font-family: 'Orbitron', sans-serif;
    white-space: nowrap;
  }
  .progress-types {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .progress-pcs {
    font-size: 11px;
    color: var(--text-dim);
  }
  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  .filter-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); background: var(--border); }
  .filter-btn.active { background: var(--accent); color: #000; font-weight: bold; }

  .color-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex: 1;
  }
  .color-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px 3px 7px;
    cursor: pointer;
    font-size: 10px;
    color: var(--text-dim);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .color-pill:hover { border-color: var(--accent); color: var(--text); }
  .color-pill.active { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
  .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .action-btns {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.reset:hover { border-color: var(--red); color: var(--red); }

  /* GRID */
  .grid-container {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  /* CARDS */
  .part-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.2s, transform 0.1s;
    position: relative;
    user-select: none;
  }
  .part-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .part-card.partial { border-color: var(--amber); }
  .part-card.done { border-color: var(--green); opacity: 0.65; }
  .part-card.hidden { display: none; }

  .card-img-wrap {
    aspect-ratio: 1;
    background: #1e2330;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .card-img-wrap img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    image-rendering: auto;
  }
  .done-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(74,232,154,0.12);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .part-card.done .done-overlay { opacity: 1; }
  .done-check {
    font-size: 36px;
    filter: drop-shadow(0 0 8px var(--green));
  }

  .color-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.4);
  }

  .card-body {
    padding: 8px;
  }
  .part-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .part-name {
    font-size: 9px;
    color: var(--text-dim);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 23px;
    margin-bottom: 7px;
  }

  .counter-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dec-btn {
    background: var(--border);
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    flex-shrink: 0;
    line-height: 1;
  }
  .dec-btn:hover { background: var(--red); color: #fff; }
  .count-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    width: 32px;
    height: 22px;
    border-radius: 4px;
    text-align: center;
    padding: 0;
    flex-shrink: 0;
  }
  .count-input:focus { outline: none; border-color: var(--accent); }
  .count-total {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* COMPLETION BANNER */
  .completion-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, #0d1520, #0a1828);
    border: 2px solid var(--accent);
    border-radius: 16px;
    padding: 32px 48px;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(74,180,232,0.2);
  }
  .completion-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .banner-icon { font-size: 48px; margin-bottom: 12px; }
  .banner-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 20px var(--accent-glow);
  }
  .banner-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>

// ── COLOR VISUAL MAP ───────────────────────────────────────────────────────
const COLOR_CSS = {
  'Black': '#1a1a1a',
  'Blue': '#2b5db8',
  'Bright Pink': '#e8a0c8',
  'Dark Blue': '#1a3060',
  'Dark Bluish Gray': '#6e7d8a',
  'Yellow': '#f0d000',
  'White': '#e8e8e8',
  'Trans-Orange': '#ff8020',
  'Trans-Dark Pink': '#c040a0',
  'Trans-Brown': '#7a5030',
  'Tan': '#c8aa70',
  'Sand Blue': '#8098b0',
  'Reddish Brown': '#7a3018',
};

// ── STATE ──────────────────────────────────────────────────────────────────
let counts = {};
let statusFilter = 'all';
let colorFilter = 'all';

function loadCounts() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    counts = saved ? JSON.parse(saved) : {};
  } catch(e) { counts = {}; }
  PARTS.forEach(p => { if(counts[p.id] === undefined) counts[p.id] = 0; });
}
function saveCounts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function getColors() {
  const seen = new Set();
  const out = [];
  PARTS.forEach(p => { if(!seen.has(p.color)) { seen.add(p.color); out.push(p.color); } });
  return out;
}

function renderColorPills() {
  const wrap = document.getElementById('color-pills');
  wrap.innerHTML = '';
  // All pill
  const allPill = document.createElement('button');
  allPill.className = 'color-pill active';
  allPill.dataset.color = 'all';
  allPill.innerHTML = 'All';
  allPill.onclick = () => setColorFilter('all', allPill);
  wrap.appendChild(allPill);
  getColors().forEach(color => {
    const pill = document.createElement('button');
    pill.className = 'color-pill';
    pill.dataset.color = color;
    pill.innerHTML = `<span class="color-dot" style="background:${COLOR_CSS[color]||'#888'}"></span>${color}`;
    pill.onclick = () => setColorFilter(color, pill);
    wrap.appendChild(pill);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;
  PARTS.forEach(p => {
    const cnt = counts[p.id] || 0;
    const done = cnt >= p.qty;
    const partial = cnt > 0 && !done;
    // Filters
    if(colorFilter !== 'all' && p.color !== colorFilter) return;
    if(statusFilter === 'remaining' && done) return;
    if(statusFilter === 'found' && !done) return;
    visible++;
    const card = document.createElement('div');
    card.className = 'part-card' + (done ? ' done' : partial ? ' partial' : '');
    card.dataset.id = p.id;
    // Image URL
    const imgUrl = `https://img.bricklink.com/ItemImage/PN/${p.colorId}/${p.no}.png`;
    const fallbackUrl = `https://img.bricklink.com/ItemImage/PN/0/${p.no}.png`;
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${imgUrl}" alt="${p.no}"
          onerror="this.src='${fallbackUrl}';this.onerror=null"
          loading="lazy">
        <div class="done-overlay"><span class="done-check">✓</span></div>
        <div class="color-badge" title="${p.color}" style="background:${COLOR_CSS[p.color]||'#888'};border-color:rgba(0,0,0,0.5)"></div>
      </div>
      <div class="card-body">
        <div class="part-num">${p.no}</div>
        <div class="part-name">${p.name}</div>
        <div class="counter-row" onclick="event.stopPropagation()">
          <button class="dec-btn" onclick="decrement('${p.id}')">−</button>
          <input class="count-input" type="number" min="0" max="${p.qty}"
            value="${cnt}" onchange="setCount('${p.id}', this.value)" onclick="this.select()">
          <span class="count-total">/${p.qty}</span>
        </div>
      </div>`;
    card.addEventListener('click', e => {
      if(e.target.closest('.counter-row')) return;
      increment(p.id);
    });
    grid.appendChild(card);
  });
  if(visible === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No parts match current filters.';
    grid.appendChild(empty);
  }
  updateStats();
}

function updateStats() {
  const total = PARTS.length;
  const totalPcs = PARTS.reduce((a,p) => a + p.qty, 0);
  let doneTypes = 0, donePcs = 0;
  PARTS.forEach(p => {
    const c = Math.min(counts[p.id]||0, p.qty);
    donePcs += c;
    if(c >= p.qty) doneTypes++;
  });
  document.getElementById('stat-types').textContent = `${doneTypes} / ${total} types`;
  document.getElementById('stat-pcs').textContent = `${donePcs} / ${totalPcs} pcs`;
  document.getElementById('progress-bar').style.width = (total > 0 ? (doneTypes/total*100) : 0) + '%';
  if(doneTypes === total && total > 0) showBanner();
}

function updateCard(id) {
  const card = document.querySelector(`.part-card[data-id="${id}"]`);
  if(!card) { renderGrid(); return; }
  const p = PARTS.find(x => x.id === id);
  const cnt = counts[id] || 0;
  const done = cnt >= p.qty;
  const partial = cnt > 0 && !done;
  card.className = 'part-card' + (done ? ' done' : partial ? ' partial' : '');
  const inp = card.querySelector('.count-input');
  if(inp) inp.value = cnt;
  updateStats();
  // hide/show based on filter
  if(statusFilter === 'remaining' && done) card.classList.add('hidden');
  if(statusFilter === 'found' && !done) card.classList.add('hidden');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function increment(id) {
  const p = PARTS.find(x => x.id === id);
  if((counts[id]||0) < p.qty) {
    counts[id] = (counts[id]||0) + 1;
    saveCounts();
    updateCard(id);
  }
}
function decrement(id) {
  if((counts[id]||0) > 0) {
    counts[id]--;
    saveCounts();
    updateCard(id);
  }
}
function setCount(id, val) {
  const p = PARTS.find(x => x.id === id);
  let v = parseInt(val, 10);
  if(isNaN(v) || v < 0) v = 0;
  if(v > p.qty) v = p.qty;
  counts[id] = v;
  saveCounts();
  updateCard(id);
}

function setStatusFilter(val, btn) {
  statusFilter = val;
  document.querySelectorAll('.filter-group .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function setColorFilter(val, pill) {
  colorFilter = val;
  document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  renderGrid();
}

function showBanner() {
  const b = document.getElementById('banner');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 5000);
}

function resetAll() {
  if(!confirm('Reset all counts to zero?')) return;
  PARTS.forEach(p => counts[p.id] = 0);
  saveCounts();
  renderGrid();
}

function exportJSON() {
  const data = JSON.stringify(counts, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'y_wing_75181_progress.json';
  a.click();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.assign(counts, data);
        saveCounts();
        renderGrid();
      } catch(err) { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadCounts();
renderColorPills();
renderGrid();
</script>
