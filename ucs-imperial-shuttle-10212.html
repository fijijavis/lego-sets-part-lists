<style>
  :root {
    --bg:#0a0c10;--surface:#12151c;--surface2:#1a1f2b;--border:#252c3a;
    --accent:#e8b94a;--accent2:#d4a030;--done:#2a2010;--done-border:#6a5010;
    --done-text:#a07828;--text:#c8cdd8;--text-dim:#5a6070;--text-bright:#eef0f5;
    --shuttle-color:#4ab4e8;--stand-color:#e8a84a;--both-color:#a07ad4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"IBM Plex Mono",monospace;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .header-title{flex:1}
  .set-number{font-family:"Orbitron",sans-serif;font-size:11px;font-weight:400;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
  h1{font-family:"Orbitron",sans-serif;font-size:16px;font-weight:900;color:var(--text-bright);letter-spacing:1px}
  .progress-block{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .progress-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  .progress-count{font-family:"Orbitron",sans-serif;font-size:15px;font-weight:700;color:var(--accent)}
  .progress-count span{font-size:10px;color:var(--text-dim);font-weight:400;font-family:"IBM Plex Mono",monospace}
  .progress-bar-wrap{width:140px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease;width:0%}
  .controls{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg);align-items:center}
  .filter-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-right:2px}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500}
  .sub-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
  .sub-btn[data-sub="Shuttle"].active{background:var(--shuttle-color);border-color:var(--shuttle-color);color:#000;font-weight:500}
  .sub-btn[data-sub="Stand"].active{background:var(--stand-color);border-color:var(--stand-color);color:#000;font-weight:500}
  .sub-btn[data-sub="Both"].active{background:var(--both-color);border-color:var(--both-color);color:#fff;font-weight:500}
  .sub-btn[data-sub="All"].active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500}
  .sub-btn:hover{border-color:var(--accent2);color:var(--text)}
  .sep{color:var(--border);margin:0 4px}
  .spacer{flex:1}
  .action-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
  .action-btn:hover{border-color:var(--accent2);color:var(--accent2)}
  .reset-btn{background:transparent;border:1px solid #3a2a2a;color:#7a4a4a;font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;transition:all 0.15s}
  .reset-btn:hover{border-color:#8a3a3a;color:#c05050}
  .color-filters{padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);align-items:center}
  .color-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:"IBM Plex Mono",monospace;font-size:10px;padding:3px 8px;border-radius:20px;cursor:pointer;transition:all 0.15s}
  .color-pill:hover{border-color:var(--accent2);color:var(--text)}
  .color-pill.active{border-color:var(--accent2);color:var(--text-bright);background:rgba(232,185,74,0.1)}
  .color-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);flex-shrink:0}
  .legend{display:flex;gap:12px;align-items:center;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg);font-size:10px;color:var(--text-dim);flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;gap:8px;position:relative;user-select:none}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
  .card.found{background:var(--done);border-color:var(--done-border);opacity:0.65}
  .card.found:hover{opacity:0.8;transform:none;box-shadow:none}
  .card.partial{border-color:#3a3010}
  .card.hidden{display:none}
  .sub-pip{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
  .sub-pip.Shuttle{background:var(--shuttle-color)}
  .sub-pip.Stand{background:var(--stand-color)}
  .sub-pip.Both{background:var(--both-color)}
  .card.found .sub-pip{display:none}
  .check-overlay{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--done-text);display:none;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .card.found .check-overlay{display:flex}
  .card-img{width:100%;aspect-ratio:1;object-fit:contain;background:#1e2230;border-radius:4px;padding:6px;border:1px solid var(--border)}
  .card.found .card-img{filter:grayscale(0.6) brightness(0.7)}
  .card-part{font-size:10px;color:var(--text-dim);letter-spacing:1px}
  .card-name{font-size:11px;color:var(--text);line-height:1.4;font-weight:500}
  .card.found .card-name{color:var(--done-text)}
  .card.partial .card-name{color:#c8a040}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
  .card-counter{display:flex;align-items:center;gap:4px}
  .counter-btn{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .counter-btn:hover{border-color:var(--accent);color:var(--accent)}
  .counter-input{width:34px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text-bright);font-family:"Orbitron",sans-serif;font-size:12px;font-weight:700;text-align:center;padding:2px 0;-moz-appearance:textfield}
  .counter-input::-webkit-outer-spin-button,.counter-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .counter-input:focus{outline:none;border-color:var(--accent2)}
  .counter-total{font-family:"Orbitron",sans-serif;font-size:10px;color:var(--text-dim)}
  .card.found .counter-btn{border-color:var(--done-border);color:var(--done-text);background:transparent}
  .card.found .counter-input{color:var(--done-text);border-color:var(--done-border);background:transparent}
  .card.found .counter-total{color:var(--done-text)}
  .card.partial .counter-input{color:var(--accent);border-color:#3a3010}
  .color-badge{font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
  .empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-dim);font-size:13px;letter-spacing:2px}
  .complete-banner{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-family:"Orbitron",sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;padding:16px 32px;border-radius:4px;box-shadow:0 8px 40px rgba(232,185,74,0.5);z-index:200;white-space:nowrap}
</style>

const TOTAL = parts.length;
const COLOR_CSS = {
  "—":"#444","Black":"#222","Blue":"#2e5ea8","Chrome Silver":"#c0c0c0",
  "Dark Bluish Gray":"#4a5260","Dark Tan":"#8a6a30","Light Bluish Gray":"#9ba5b5",
  "Red":"#c02020","Tan":"#d4a55a","Trans-Brown":"rgba(100,60,20,0.6)",
  "Trans-Clear":"rgba(200,220,255,0.4)","Trans-Dark Blue":"rgba(20,40,140,0.7)",
  "Trans-Neon Green":"rgba(80,220,40,0.8)","Trans-Red":"rgba(200,20,20,0.7)",
  "Trans-Yellow":"rgba(220,200,20,0.7)","White":"#f0f0f0","Yellow":"#f5c400"
};
const ALL_COLORS = ["All",...new Set(parts.map(p=>p.color))];
const SAVE_KEY = "lego10212_counts";
let foundCounts = {};
let activeFilter = "all";
let activeColor = "All";
let activeSub = "All";

function imgUrl(part,colorId){return colorId===0?`https://img.bricklink.com/ItemImage/PN/0/${part}.png`:`https://img.bricklink.com/ItemImage/PN/${colorId}/${part}.png`;}
function loadProgress(){try{const s=localStorage.getItem(SAVE_KEY);if(s)foundCounts=JSON.parse(s);}catch{}}
function saveProgress(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(foundCounts));}catch{}}
function exportProgress(){const b=new Blob([JSON.stringify(foundCounts)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="imperial_shuttle_10212_progress.json";a.click();}
function importProgress(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{foundCounts=JSON.parse(ev.target.result);saveProgress();buildGrid();updateProgress();applyFilters();}catch{alert("Invalid file");}};r.readAsText(f);}
function resetAll(){if(!confirm("Reset all progress?"))return;foundCounts={};saveProgress();document.querySelectorAll(".card").forEach(c=>{c.classList.remove("found","partial");const i=c.querySelector(".counter-input");if(i)i.value=0;});updateProgress();applyFilters();}

function buildColorFilters(){
  const c=document.getElementById("color-filters");
  ALL_COLORS.forEach(col=>{
    const b=document.createElement("button");b.className="color-pill"+(col==="All"?" active":"");b.dataset.color=col;
    if(col!=="All"){const d=document.createElement("span");d.className="color-dot";d.style.background=COLOR_CSS[col]||"#888";b.appendChild(d);}
    b.appendChild(document.createTextNode(col));
    b.addEventListener("click",()=>{document.querySelectorAll(".color-pill").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeColor=col;applyFilters();});
    c.appendChild(b);
  });
}

function buildGrid(){
  const grid=document.getElementById("grid");grid.innerHTML="";
  parts.forEach((p,i)=>{
    const cnt=foundCounts[i]||0;const full=cnt>=p.qty;const partial=cnt>0&&cnt<p.qty;
    const card=document.createElement("div");card.className="card"+(full?" found":partial?" partial":"");card.dataset.index=i;card.dataset.color=p.color;card.dataset.sub=p.sub;
    const img=document.createElement("img");img.className="card-img";img.src=imgUrl(p.part,p.colorId);img.alt=p.name;
    img.onerror=function(){if(!this.src.includes("/0/"))this.src=`https://img.bricklink.com/ItemImage/PN/0/${p.part}.png`;else this.style.display="none";};
    const pip=document.createElement("div");pip.className=`sub-pip ${p.sub}`;
    const check=document.createElement("div");check.className="check-overlay";check.textContent="✓";
    const partNo=document.createElement("div");partNo.className="card-part";partNo.textContent=p.part;
    const name=document.createElement("div");name.className="card-name";name.textContent=p.name;
    const footer=document.createElement("div");footer.className="card-footer";
    const counter=document.createElement("div");counter.className="card-counter";
    const btnM=document.createElement("button");btnM.className="counter-btn";btnM.textContent="−";
    const input=document.createElement("input");input.type="number";input.className="counter-input";input.min=0;input.max=p.qty;input.value=cnt;
    const tot=document.createElement("span");tot.className="counter-total";tot.textContent="/"+p.qty;
    counter.append(btnM,input,tot);
    const dot=document.createElement("span");dot.style.cssText=`display:inline-block;width:7px;height:7px;border-radius:50%;background:${COLOR_CSS[p.color]||"#888"};border:1px solid rgba(255,255,255,0.2);margin-right:3px;vertical-align:middle;`;
    const badge=document.createElement("div");badge.className="color-badge";badge.appendChild(dot);
    footer.append(counter,badge);card.append(img,pip,check,partNo,name,footer);
    function updateState(){const v=Math.max(0,Math.min(p.qty,parseInt(input.value)||0));input.value=v;foundCounts[i]=v;card.classList.toggle("found",v>=p.qty);card.classList.toggle("partial",v>0&&v<p.qty);saveProgress();updateProgress();applyFilters();checkComplete();}
    card.addEventListener("click",e=>{if(e.target===input||e.target===btnM)return;input.value=Math.min(p.qty,(parseInt(input.value)||0)+1);updateState();});
    btnM.addEventListener("click",e=>{e.stopPropagation();input.value=Math.max(0,(parseInt(input.value)||0)-1);updateState();});
    input.addEventListener("click",e=>e.stopPropagation());input.addEventListener("change",updateState);input.addEventListener("input",updateState);
    grid.appendChild(card);
  });
}

function applyFilters(){
  let vis=0;
  document.querySelectorAll(".card").forEach(card=>{
    const full=card.classList.contains("found");
    const cok=activeColor==="All"||card.dataset.color===activeColor;
    const sok=activeSub==="All"||card.dataset.sub===activeSub||card.dataset.sub==="Both";
    const fok=activeFilter==="all"||(activeFilter==="found"&&full)||(activeFilter==="remaining"&&!full);
    card.classList.toggle("hidden",!(cok&&sok&&fok));if(cok&&sok&&fok)vis++;
  });
  let empty=document.getElementById("empty-state");
  if(vis===0){if(!empty){empty=document.createElement("div");empty.id="empty-state";empty.className="empty";empty.textContent="— NO PARTS MATCH —";document.getElementById("grid").appendChild(empty);}}
  else if(empty)empty.remove();
}

function updateProgress(){
  const n=parts.filter((_,i)=>(foundCounts[i]||0)>=parts[i].qty).length;
  const pcs=parts.reduce((s,p,i)=>s+(foundCounts[i]||0),0);
  const tot=parts.reduce((s,p)=>s+p.qty,0);
  document.getElementById("found-count").innerHTML=`${n} <span>/ ${TOTAL} types · ${pcs} / ${tot} pcs</span>`;
  document.getElementById("progress-bar").style.width=Math.round(n/TOTAL*100)+"%";
}

function checkComplete(){
  const n=parts.filter((_,i)=>(foundCounts[i]||0)>=parts[i].qty).length;
  if(n===TOTAL){const b=document.getElementById("complete-banner");b.style.display="block";setTimeout(()=>b.style.display="none",5000);}
}

document.querySelectorAll(".filter-btn").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");activeFilter=btn.dataset.filter;applyFilters();});});
document.querySelectorAll(".sub-btn").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".sub-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");activeSub=btn.dataset.sub;applyFilters();});});

loadProgress();buildColorFilters();buildGrid();updateProgress();applyFilters();
