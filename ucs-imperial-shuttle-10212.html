<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGO 10212 — Imperial Shuttle Parts Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2b;
    --border: #252c3a;
    --accent: #e8b94a;
    --accent2: #4a8ee8;
    --done: #2a3a2a;
    --done-border: #3a6b3a;
    --done-text: #4a8a4a;
    --text: #c8cdd8;
    --text-dim: #5a6070;
    --text-bright: #eef0f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .header-title {
    flex: 1;
    min-width: 200px;
  }

  .set-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--text-bright);
    letter-spacing: 1px;
  }

  /* ── Progress ── */
  .progress-block {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .progress-count span {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
    font-family: 'IBM Plex Mono', monospace;
  }

  .progress-bar-wrap {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  .spacer { flex: 1; }

  .reset-btn {
    background: transparent;
    border: 1px solid #3a2a2a;
    color: #7a4a4a;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #8a3a3a; color: #c05050; }

  /* ── Color filter pills ── */
  .color-filters {
    padding: 12px 32px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    align-items: center;
  }

  .color-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .color-pill:hover { border-color: var(--accent2); color: var(--text); }
  .color-pill.active { border-color: var(--accent2); color: var(--text-bright); background: rgba(74,142,232,0.1); }

  .color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 24px 32px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    user-select: none;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .card.found {
    background: var(--done);
    border-color: var(--done-border);
    opacity: 0.65;
  }

  .card.found:hover {
    opacity: 0.8;
    transform: none;
    box-shadow: none;
  }

  .card.hidden { display: none; }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: #1e2230;
    border-radius: 4px;
    padding: 8px;
    border: 1px solid var(--border);
  }

  .card.found .card-img {
    filter: grayscale(0.6) brightness(0.7);
  }

  .check-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--done-text);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #fff;
  }

  .card.found .check-overlay { display: flex; }

  .card-info { display: flex; flex-direction: column; gap: 4px; }

  .card-part {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .card-name {
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    font-weight: 500;
  }

  .card.found .card-name { color: var(--done-text); }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
  }

  .card-qty {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }

  .card.found .card-qty { color: var(--done-text); }

  .color-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ── Counter ── */
  .card-counter {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .counter-btn {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .counter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .counter-input {
    width: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-bright);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    padding: 2px 0;
    -moz-appearance: textfield;
  }
  .counter-input::-webkit-outer-spin-button,
  .counter-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .counter-input:focus { outline: none; border-color: var(--accent2); }

  .counter-total {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* partial found */
  .card.partial {
    border-color: #3a4a2a;
  }
  .card.partial .card-name { color: #7aaa5a; }
  .card.partial .counter-input { color: var(--accent); border-color: #3a4a2a; }

  .card.found .counter-btn { border-color: var(--done-border); color: var(--done-text); background: transparent; }
  .card.found .counter-btn:hover { border-color: var(--done-text); }
  .card.found .counter-input { color: var(--done-text); border-color: var(--done-border); background: transparent; }
  .card.found .counter-total { color: var(--done-text); }

  /* ── Empty state ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* ── Completion banner ── */
  .complete-banner {
    display: none;
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 16px 32px;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(232, 185, 74, 0.4);
    animation: slideUp 0.4s ease;
    z-index: 200;
    white-space: nowrap;
  }

  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(20px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);  opacity: 1; }
  }
</style>
</head>

const TOTAL = parts.length;
const COLOR_CSS = {
  "White":"#f0f0f0","Yellow":"#f5c400","Black":"#1a1a1a",
  "Light Bluish Gray":"#9ba5b5","Dark Bluish Gray":"#4a5260",
  "Blue":"#2e5ea8","Red":"#c02020","Tan":"#d4a55a","Dark Tan":"#8a6a30",
  "Trans-Yellow":"rgba(255,230,50,0.7)","Trans-Red":"rgba(200,30,30,0.6)",
  "Trans-Neon Green":"rgba(0,220,80,0.7)","Trans-Dark Blue":"rgba(20,50,150,0.7)",
  "Trans-Clear":"rgba(200,220,255,0.4)","Trans-Brown":"rgba(100,60,20,0.6)",
  "Chrome Silver":"#c8cdd8","—":"#444"
};

let found = new Set();
let foundCounts = {}; // index -> count
let activeFilter = "all";
let activeColor = "all";
const SAVE_KEY = "lego10212_found";

function imgUrl(part, colorId) {
  if (colorId === 0) return "https://img.bricklink.com/ItemImage/PN/0/" + part + ".png";
  return "https://img.bricklink.com/ItemImage/PN/" + colorId + "/" + part + ".png";
}

function cardKey(i) { return "card_" + i; }

function buildColorFilters() {
  const colors = ["all", ...new Set(parts.map(p => p.color))];
  const container = document.getElementById("color-filters");
  colors.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "color-pill" + (c === "all" ? " active" : "");
    btn.dataset.color = c;
    if (c !== "all") {
      const dot = document.createElement("span");
      dot.className = "color-dot";
      dot.style.background = COLOR_CSS[c] || "#888";
      btn.appendChild(dot);
    }
    btn.appendChild(document.createTextNode(c === "all" ? "All Colors" : c));
    btn.addEventListener("click", () => {
      document.querySelectorAll(".color-pill").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeColor = c;
      applyFilters();
    });
    container.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  parts.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.index = i;
    card.dataset.color = p.color;
    if (found.has(i)) card.classList.add("found");

    const img = document.createElement("img");
    img.className = "card-img";
    img.src = imgUrl(p.part, p.colorId);
    img.alt = p.name;
    img.onerror = function() {
      this.src = "https://img.bricklink.com/ItemImage/PN/0/" + p.part + ".png";
      this.onerror = function() { this.style.display='none'; };
    };

    const check = document.createElement("div");
    check.className = "check-overlay";
    check.textContent = "✓";

    const info = document.createElement("div");
    info.className = "card-info";

    const partNo = document.createElement("div");
    partNo.className = "card-part";
    partNo.textContent = p.part;

    const name = document.createElement("div");
    name.className = "card-name";
    name.textContent = p.name;

    info.appendChild(partNo);
    info.appendChild(name);

    const footer = document.createElement("div");
    footer.className = "card-footer";

    // ── Counter ──
    const counter = document.createElement("div");
    counter.className = "card-counter";

    const btnMinus = document.createElement("button");
    btnMinus.className = "counter-btn";
    btnMinus.textContent = "−";

    const input = document.createElement("input");
    input.type = "number";
    input.className = "counter-input";
    input.min = 0;
    input.max = p.qty;
    input.value = foundCounts[i] || 0;

    const total = document.createElement("span");
    total.className = "counter-total";
    total.textContent = "/ " + p.qty;

    counter.appendChild(btnMinus);
    counter.appendChild(input);
    counter.appendChild(total);

    const badge = document.createElement("div");
    badge.className = "color-badge";
    const dot = document.createElement("span");
    dot.style.cssText = "display:inline-block;width:7px;height:7px;border-radius:50%;background:" + (COLOR_CSS[p.color]||"#888") + ";border:1px solid rgba(255,255,255,0.2);margin-right:5px;vertical-align:middle;";
    badge.appendChild(dot);
    badge.appendChild(document.createTextNode(p.color));

    footer.appendChild(counter);
    footer.appendChild(badge);

    card.appendChild(img);
    card.appendChild(check);
    card.appendChild(info);
    card.appendChild(footer);

    // Update card state from counter value
    function updateCardState() {
      const val = Math.max(0, Math.min(p.qty, parseInt(input.value) || 0));
      input.value = val;
      foundCounts[i] = val;
      if (val >= p.qty) {
        found.add(i);
        card.classList.add("found");
        card.classList.remove("partial");
      } else if (val > 0) {
        found.delete(i);
        card.classList.remove("found");
        card.classList.add("partial");
      } else {
        found.delete(i);
        card.classList.remove("found");
        card.classList.remove("partial");
      }
      saveProgress();
      updateProgress();
      applyFilters();
      checkComplete();
    }

    // Clicking the card image/name area increments by 1
    card.addEventListener("click", (e) => {
      if (e.target === input || e.target === btnMinus) return;
      const val = Math.min(p.qty, (parseInt(input.value) || 0) + 1);
      input.value = val;
      updateCardState();
    });

    btnMinus.addEventListener("click", (e) => {
      e.stopPropagation();
      const val = Math.max(0, (parseInt(input.value) || 0) - 1);
      input.value = val;
      updateCardState();
    });

    input.addEventListener("click", e => e.stopPropagation());
    input.addEventListener("change", updateCardState);
    input.addEventListener("input", updateCardState);

    grid.appendChild(card);
  });
}

function applyFilters() {
  const cards = document.querySelectorAll(".card");
  let visible = 0;
  cards.forEach(card => {
    const i = parseInt(card.dataset.index);
    const iFound = found.has(i);
    const iPartial = card.classList.contains("partial");
    const colorMatch = activeColor === "all" || card.dataset.color === activeColor;
    const filterMatch = activeFilter === "all" ||
      (activeFilter === "found" && iFound) ||
      (activeFilter === "remaining" && !iFound);
    const show = colorMatch && filterMatch;
    card.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  let empty = document.getElementById("empty-state");
  if (visible === 0) {
    if (!empty) {
      empty = document.createElement("div");
      empty.id = "empty-state";
      empty.className = "empty";
      empty.textContent = "— NO PARTS MATCH —";
      document.getElementById("grid").appendChild(empty);
    }
  } else if (empty) {
    empty.remove();
  }
}

function updateProgress() {
  const n = found.size;
  // count total individual pieces found
  let piecesFound = 0;
  let piecesTotal = 0;
  parts.forEach((p, i) => {
    piecesFound += (foundCounts[i] || 0);
    piecesTotal += p.qty;
  });
  document.getElementById("found-count").innerHTML = n + ' <span>/ ' + TOTAL + ' types &nbsp;·&nbsp; ' + piecesFound + ' / ' + piecesTotal + ' pcs</span>';
  document.getElementById("progress-bar").style.width = Math.round(n / TOTAL * 100) + "%";
}

function checkComplete() {
  const banner = document.getElementById("complete-banner");
  if (found.size === TOTAL) {
    banner.style.display = "block";
    setTimeout(() => banner.style.display = "none", 5000);
  }
}

function saveProgress() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(foundCounts)); } catch(e) {}
}

function loadProgress() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      // support old format (array of indices) and new format (object of counts)
      if (Array.isArray(data)) {
        data.forEach(i => { foundCounts[i] = parts[i] ? parts[i].qty : 1; found.add(i); });
      } else {
        foundCounts = data;
        parts.forEach((p, i) => {
          const c = foundCounts[i] || 0;
          if (c >= p.qty) found.add(i);
        });
      }
    }
  } catch(e) {}
}

function resetAll() {
  if (!confirm("Reset all progress? This cannot be undone.")) return;
  found.clear();
  foundCounts = {};
  saveProgress();
  document.querySelectorAll(".card").forEach(c => {
    c.classList.remove("found", "partial");
    const inp = c.querySelector(".counter-input");
    if (inp) inp.value = 0;
  });
  updateProgress();
  applyFilters();
}

// Filter button listeners
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

// Init
loadProgress();
buildColorFilters();
buildGrid();
updateProgress();
applyFilters();
</script>
